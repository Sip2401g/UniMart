services:
  - type: web
    name: college-marketplace-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: college-marketplace-backend
          property: url
      - key: VITE_UPLOADS_URL
        fromService:
          type: web
          name: college-marketplace-backend
          property: url

  - type: web
    name: college-marketplace-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: college-marketplace-ai
          property: url

  - type: web
    name: college-marketplace-ai
    runtime: python
    rootDir: ai-services
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
